<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Juego de Ahorcado — Adivina la Palabra. Diseño moderno estilo arcade." />
  <title>Ahorcado · Adivina la Palabra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ─── Animated Background ─────────────────────────── -->
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<!-- ─── Toast Notification ──────────────────────────── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ─── Main App ─────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-label">juego clásico</span>
      <h1 class="logo-title">ADI<span>VINA</span> LA PALABRA</h1>
    </div>
    <div class="header-controls">
      <button id="btn-theme" class="btn-icon" title="Cambiar tema" aria-label="Cambiar tema">☀️</button>
      <button id="btn-new-game" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M3 12a9 9 0 1 1 2.6 6.4"/><path d="M3 18V12h6"/>
        </svg>
        Nueva Partida
      </button>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" role="region" aria-label="Estadísticas">
    <div class="stat-chip glass-card score">
      <div id="score-value" class="stat-value">0</div>
      <div class="stat-label">Puntos</div>
    </div>
    <div class="stat-chip glass-card wins">
      <div id="wins-value" class="stat-value">0</div>
      <div class="stat-label">Ganadas</div>
    </div>
    <div class="stat-chip glass-card losses">
      <div id="losses-value" class="stat-value">0</div>
      <div class="stat-label">Perdidas</div>
    </div>
    <div class="stat-chip glass-card">
      <div id="played-value" class="stat-value">0</div>
      <div class="stat-label">Jugadas</div>
    </div>
  </div>

  <!-- Setup Panel -->
  <div class="setup-panel" role="region" aria-label="Configuración de partida">

    <!-- Difficulty -->
    <div class="glass-card">
      <div class="setup-label">Dificultad</div>
      <div class="pill-group" role="group" aria-label="Nivel de dificultad">
        <button class="pill easy" data-difficulty="easy">Fácil</button>
        <button class="pill medium active" data-difficulty="medium">Medio</button>
        <button class="pill hard" data-difficulty="hard">Difícil</button>
      </div>
    </div>

    <!-- Category -->
    <div class="glass-card" style="flex: 2;">
      <div class="setup-label">Categoría</div>
      <div class="pill-group" role="group" aria-label="Categoría de palabras">
        <button class="pill active" data-category="Animales">🐾 Animales</button>
        <button class="pill" data-category="Paises">🌍 Países</button>
        <button class="pill" data-category="Tecnología">💻 Tech</button>
        <button class="pill" data-category="Deportes">⚽ Deportes</button>
        <button class="pill" data-category="Comida">🍕 Comida</button>
        <button class="pill" data-category="Ciencia">🔬 Ciencia</button>
      </div>
    </div>

  </div>

  <!-- Main Game Grid -->
  <main class="game-grid" role="main">

    <!-- Left: Gallows + Info -->
    <aside class="glass-card gallows-panel" aria-label="Panel del ahorcado">

      <!-- SVG Hangman -->
      <svg id="hangman-svg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-label="Dibujo del ahorcado" role="img">
        <!-- Gallows (static) -->
        <!-- Base -->
        <line x1="10" y1="210" x2="100" y2="210" class="gallows-static"/>
        <!-- Vertical pole -->
        <line x1="40" y1="210" x2="40" y2="20"  class="gallows-static"/>
        <!-- Horizontal beam -->
        <line x1="40" y1="20"  x2="130" y2="20"  class="gallows-static"/>
        <!-- Diagonal support -->
        <line x1="40" y1="55"  x2="70"  y2="20"  class="gallows-static"/>
        <!-- Rope -->
        <line x1="130" y1="20" x2="130" y2="48"  class="gallows-static"/>

        <!-- Body parts (animated) -->
        <!-- Head -->
        <circle id="hm-head"  cx="130" cy="62" r="14" class="hangman-part"/>
        <!-- Body -->
        <line   id="hm-body"  x1="130" y1="76" x2="130" y2="130" class="hangman-part"/>
        <!-- Right arm -->
        <line   id="hm-arm-r" x1="130" y1="88" x2="155" y2="110" class="hangman-part"/>
        <!-- Left arm -->
        <line   id="hm-arm-l" x1="130" y1="88" x2="105" y2="110" class="hangman-part"/>
        <!-- Right leg -->
        <line   id="hm-leg-r" x1="130" y1="130" x2="155" y2="160" class="hangman-part"/>
        <!-- Left leg -->
        <line   id="hm-leg-l" x1="130" y1="130" x2="105" y2="160" class="hangman-part"/>
        <!-- Left eye -->
        <circle id="hm-eye-l" cx="124" cy="59" r="2.5"  class="hangman-part" style="fill: currentColor;"/>
        <!-- Right eye -->
        <circle id="hm-eye-r" cx="136" cy="59" r="2.5"  class="hangman-part" style="fill: currentColor;"/>
        <!-- Mouth (X shape) -->
        <g id="hm-mouth" class="hangman-part">
          <line x1="125" y1="67" x2="135" y2="73"/>
          <line x1="135" y1="67" x2="125" y2="73"/>
        </g>
      </svg>

      <!-- Attempts ring -->
      <div class="attempts-ring" aria-label="Intentos restantes">
        <svg viewBox="0 0 90 90">
          <circle class="attempts-ring-bg" cx="45" cy="45" r="36"/>
          <circle id="attempts-ring-fill" class="attempts-ring-fill" cx="45" cy="45" r="36"
                  stroke-dasharray="226" stroke-dashoffset="0"/>
        </svg>
        <div class="attempts-center">
          <span id="attempts-number" class="attempts-number">7</span>
          <span class="attempts-sub">vidas</span>
        </div>
      </div>

      <!-- Timer -->
      <div class="timer-row" role="timer" aria-live="polite" aria-atomic="true">
        <span class="timer-icon">⏱</span>
        <span id="timer-display" class="timer-display">01:30</span>
      </div>

      <!-- Wrong letters -->
      <div class="wrong-letters-section">
        <div class="section-label">Errores</div>
        <div id="wrong-letters-grid" class="wrong-letters-grid" aria-label="Letras incorrectas" aria-live="polite"></div>
      </div>

    </aside>

    <!-- Right: Word + Keyboard -->
    <div class="right-panel">

      <!-- Word Display -->
      <section class="glass-card word-panel" aria-label="Palabra a adivinar">
        <div id="category-badge" class="category-badge">
          <span id="category-badge-text">🐾 Animales</span>
        </div>
        <div id="word-display" class="word-display" role="group" aria-label="Letras de la palabra"></div>
        <p id="word-hint" class="word-hint" aria-live="polite"></p>
      </section>

      <!-- Keyboard -->
      <section class="glass-card keyboard-panel" aria-label="Teclado virtual">
        <div id="keyboard-grid" class="keyboard-grid" role="group" aria-label="Letras del abecedario"></div>
      </section>

    </div>
  </main>

</div><!-- #app -->

<!-- ─── Modal ─────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal glass-card">
    <span id="modal-icon" class="modal-icon" aria-hidden="true">🏆</span>
    <h2 id="modal-title" class="modal-title win">¡GANASTE!</h2>
    <p id="modal-subtitle" class="modal-subtitle"></p>

    <div class="modal-word-reveal">
      <div class="modal-word-label">La palabra era</div>
      <div id="modal-word" class="modal-word"></div>
    </div>

    <div class="modal-stats">
      <div class="modal-stat">
        <span id="modal-total-wins" class="modal-stat-v">0</span>
        <span class="modal-stat-l">Ganadas</span>
      </div>
      <div class="modal-stat">
        <span id="modal-time-bonus" class="modal-stat-v">+0</span>
        <span class="modal-stat-l">Bono tiempo</span>
      </div>
      <div class="modal-stat">
        <span id="modal-total-played" class="modal-stat-v">0</span>
        <span class="modal-stat-l">Jugadas</span>
      </div>
    </div>

    <button id="modal-btn-play" class="btn btn-primary" style="width:100%; padding: 14px; font-size: 15px; letter-spacing: 1px;">
      🎮 &nbsp;JUGAR DE NUEVO
    </button>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
